<h1>The Events</h1>
<br>
<br>
<br>
<div 
  style="background-color: antiquewhite; width: 100px; height: 100px;"

  (click)="handleEvent($event)"
  (mouseenter)="handleEvent($event)"
  (mouseleave)="handleEvent($event)"
  >

</div>
<br>
<br>
<br>
<input type="text" (click)="handleButtonEvent($event)" (mouseenter)="handleInputEvent($event)"
  (mouseleave)="handleInputEvent($event)" >

<br>
<br>
<input type="text"(focus)="handleEvent($event)"
  (blur)="handleEvent($event)" placeholder="here">
<br>
<br>
<button (click)="handleButtonEvent($event)"(mouseenter)="handleButtonEvent($event)"
  (mouseleave)="handleButtonEvent($event)">Submit</button>
